<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Supply & Demand Analyzer</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

<header>
<h1>Smart Supply & Demand Analyzer</h1>
<p class="subtitle">AI-powered chart structure analysis</p>
</header>

<section class="upload-section">
<label class="upload-box">
<input type="file" id="chartUpload" accept="image/*" hidden />
<span>Upload Chart Screenshot</span>
</label>

<label class="upload-box secondary">
<input type="file" id="htfUpload" accept="image/*" hidden />
<span>Add Higher Timeframe Screenshot (Optional)</span>
</label>

<select id="timeframe">
<option value="1m">1 Minute</option>
<option value="5m">5 Minutes</option>
<option value="15m">15 Minutes</option>
<option value="30m">30 Minutes</option>
<option value="1h">1 Hour</option>
<option value="4h">4 Hours</option>
<option value="1d">Daily</option>
<option value="1w">Weekly</option>
</select>

<button id="analyzeBtn">Analyze Chart</button>
</section>

<section class="analysis-section hidden">

<div class="chart-container">
<img id="chartImage" />
<canvas id="overlayCanvas"></canvas>
</div>

<div class="zones-panel">
<h2>Identified Zones</h2>
<div id="zonesList"></div>
</div>

</section>

<div id="loadingOverlay" class="hidden">
<div class="loader"></div>
<p>Analyzing Chart...</p>
</div>

</div>

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="renderer.js"></script>
</body>
</html>
