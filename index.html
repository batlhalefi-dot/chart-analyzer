<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Zone Validator</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

<header>
<h1>Smart Zone Validator</h1>
<p class="subtitle">Draw it. We'll score it.</p>
</header>

<section class="upload-section">
<label class="upload-box">
<input type="file" id="chartUpload" accept="image/*" hidden />
<span>📷 Upload Chart Screenshot</span>
</label>

<select id="timeframe">
<option value="1m">1 Minute</option>
<option value="5m">5 Minutes</option>
<option value="15m">15 Minutes</option>
<option value="1h">1 Hour</option>
<option value="4h">4 Hours</option>
<option value="1d">Daily</option>
</select>

<button id="toggleDrawBtn" disabled class="analyze-btn" style="background:#f97316;">
🎨 Start Drawing Zones
</button>

<div id="drawInstructions" class="hidden">
<p>Drag your finger/curser over the zone you want to analyze.</p>
</div>
</section>

<section class="analysis-section hidden">

<div class="chart-container" id="chartContainer">
<img id="chartImage" />
<canvas id="overlayCanvas"></canvas>
</div>

<div class="zones-panel">
<h2>Zone Analysis</h2>
<div id="zoneResult" class="hidden">
<div class="score-card">
<div class="score-circle" id="scoreCircle">0</div>
<p id="zoneTypeLabel">ZONE TYPE</p>
</div>
<div class="reasons-list" id="reasonsList"></div>
<div class="verdict" id="verdictText"></div>
</div>
<div id="placeholderText">
Analyze nothing yet. Draw a box on the chart above!
</div>
</div>

</section>

<div id="loadingOverlay" class="hidden">
<div class="loader"></div>
<p>Analyzing...</p>
</div>

</div>

<script src="logic.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
